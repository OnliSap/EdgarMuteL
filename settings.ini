[STYLES]
qcombobox = 
	            background: #1e293b; 
	            color: #f8fafc; 
	            padding: 8px; 
	            border-radius: 8px; 
	            border: 2px solid #334155; 
	            font-size: 14px;
	        
qcombobox_downarrow = 
	            image: none; 
	            border-left: 5px solid transparent; 
	            border-right: 5px solid transparent; 
	            border-top: 5px solid #94a3b8; 
	            margin-right: 10px;
	        
qcombobox_menu = 
	            background-color: #1e293b;
	            color: #f8fafc;
	            selection-background-color: #6366f1;
	            selection-color: white;
	            border: 2px solid #334155;
	            outline: 0px;
	        

