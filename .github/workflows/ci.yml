name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server-tests:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run server startup tests
        run: python -m unittest tests.test_server_startup -v

  gui-tests:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GUI startup tests
        run: python -m unittest discover -s tests -p "test_gui_startup.py" -v

      - name: Run config startup tests
        run: python -m unittest discover -s tests -p "test_config_startup.py" -v

      - name: Check syntax
        run: python -m py_compile bot.py main.py

      - name: Build executable
        run: pyinstaller --clean --noconsole --onefile --name nadziratel bot.py
