name: Python Code Check

# Пайплайн запускается автоматически при каждом пуше в ветку main
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # Запускаем чистую виртуальную машину на Ubuntu Linux в облаке GitHub
    runs-on: ubuntu-latest

    steps:
    # 1. Копируем файлы твоего репозитория на сервер GitHub
    - uses: actions/checkout@v4

    # 2. Разворачиваем Python нужной версии
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3. Устанавливаем твои зависимости
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install discord.py flask PySide6 requests

    # 4. Проверяем, что главный файл компилируется и в нем нет синтаксического бреда
    - name: Test compile python scripts
      run: |
        python -m compileall bot.py main.py
